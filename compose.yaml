services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: condominio
      POSTGRES_USER: condominio
      POSTGRES_PASSWORD: condominio123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condominio -d condominio"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/condominio
      DATABASE_USERNAME: condominio
      DATABASE_PASSWORD: condominio123
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
